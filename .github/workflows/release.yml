# This GitHub Actions workflow is triggered when a new tag is pushed to the repository.
# It can also be triggered manually from the GitHub Actions UI.
# It builds the Tauri application for multiple targets, creates a GitHub Release,
# and uploads the compiled application artifacts to that release.

name: Release

# Controls when the workflow will run
on:
    # Triggers the workflow on push events, but only for tags that match the pattern 'v*.*.*'
    # e.g., v1.0.0, v1.2.3, v0.1.0-beta.1
    push:
        tags:
            - "v*.*.*"

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

env:
    # Public URL of the self-hosted Flatpak repo. Used by both
    # release-tauri (to embed install instructions in release notes) and
    # release-flatpak (to template the .flatpakref / index.html).
    #
    # This URL is baked permanently into every installed user's OSTree
    # remote config, so changing it breaks `flatpak update` for existing
    # users until they remove + re-add the remote. Treat it as load-bearing.
    PAGES_URL: https://flatpak.chronicler.pro

jobs:
    # The main job that builds and releases the application for multiple platforms
    release-tauri:
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "macos-15-intel" # Intel Mac
                      target: "x86_64-apple-darwin"
                    - platform: "macos-14" # Apple Silicon Mac
                      target: "aarch64-apple-darwin"
                    - platform: "ubuntu-22.04" # For x86_64 .deb, .AppImage, and .rpm
                      target: "x86_64-unknown-linux-gnu"
                    - platform: "windows-latest"
                      target: "x86_64-pc-windows-msvc"

        # The type of runner that the job will run on
        runs-on: ${{ matrix.platform }}

        steps:
            # Step 1: Check out the repository's code
            - name: Checkout repository
              uses: actions/checkout@v4

            # Step 2: Install Linux-specific dependencies (only on Linux runners).
            # Flatpak tooling is NOT installed here; it lives in the dedicated
            # `release-flatpak` job which runs in a Flathub-published container.
            - name: Install dependencies (Linux)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            # Step 3: Setup pnpm
            - name: Setup pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10

            # Step 4: Install Tauri CLI globally
            - name: Install Tauri CLI
              run: pnpm add -g @tauri-apps/cli

            # Step 5: Install frontend dependencies
            - name: Install Dependencies
              run: pnpm install

            # Step 6: Sync SvelteKit to generate necessary files
            # It ensures .svelte-kit/tsconfig.json exists before the build starts.
            - name: Sync SvelteKit
              run: pnpm svelte-kit sync

            # Step 7a: Read the ENTIRE changelog for the updater's JSON file
            - name: Read full changelog for updater
              id: read_full_changelog
              shell: bash # Ensures this runs correctly on Windows
              run: |
                  content=$(cat ./CHANGELOG.md)
                  echo "changes<<EOF" >> $GITHUB_OUTPUT
                  echo "$content" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            # Step 7b: Read ONLY THE LATEST entry for the public GitHub Release notes
            - name: Read latest changelog entry for GitHub Release
              id: read_latest_changelog
              uses: mindsers/changelog-reader-action@v2
              with:
                  # Use the git tag (e.g., "v0.3.0") to find the correct version
                  version: ${{ github.ref_name }}
                  # The path to your changelog file
                  path: ./CHANGELOG.md

            # Step 8: Build the Tauri application and create the release
            # This step uses the FULL changelog to ensure `latest.json` contains all the data our app needs.
            - name: Build and Release
              uses: tauri-apps/tauri-action@v0
              env:
                  # This token is provided by GitHub Actions for authentication.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Sign the app with personal tauri key
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  # Keygen licensing
                  KEYGEN_PRODUCT_TOKEN: ${{ secrets.KEYGEN_PRODUCT_TOKEN }}
                  KEYGEN_PUBLIC_KEY: ${{ secrets.KEYGEN_PUBLIC_KEY }}
                  # Emit line-table debug info on Windows only so a sidecar
                  # `chronicler.pdb` is generated alongside the .exe (uploaded
                  # below). Linux/macOS skip this to avoid bloating the
                  # bundled binary - those platforms don't have an automatic
                  # crash-offset capture mechanism we can symbolise anyway.
                  RUSTFLAGS: ${{ matrix.platform == 'windows-latest' && '-C debuginfo=line-tables-only' || '' }}
              with:
                  # Pass the target triple to the build command
                  args: --target ${{ matrix.target }}

                  # The tag name that will be used for the release.
                  tagName: ${{ github.ref_name }}

                  # The name of the release, using the git tag directly.
                  releaseName: "Chronicler ${{ github.ref_name }}"
                  # Use the FULL changelog here. This populates the `notes` field in the generated `latest.json`.
                  releaseBody: ${{ steps.read_full_changelog.outputs.changes }}
                  releaseDraft: true # It's safest to create a draft first

            # Step 8.5: Upload the Windows PDB (debug symbols) to the draft release.
            # Allows us to resolve fault offsets in user-reported Windows crashes.
            - name: Upload Windows PDB to release
              if: matrix.platform == 'windows-latest'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  pdb="src-tauri/target/${{ matrix.target }}/release/chronicler.pdb"
                  if [ ! -f "$pdb" ]; then
                    echo "Expected PDB at $pdb but it was not generated." >&2
                    exit 1
                  fi
                  gh release upload "${{ github.ref_name }}" "$pdb" --clobber

            # Step 8.6: Replace the auto-generated release notes with the
            # latest changelog entry plus static installation instructions.
            # Linux-only — runs once per release.
            - name: Update release notes
              if: matrix.platform == 'ubuntu-22.04'
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  LATEST_CHANGES: ${{ steps.read_latest_changelog.outputs.changes }}
              run: |
                  echo "$LATEST_CHANGES" > FINAL_RELEASE_NOTES.md
                  cat >> FINAL_RELEASE_NOTES.md <<EOF

                  ## Installation & Notes

                  - **💻 Windows**: Download the \`.msi\` file to install.
                  - **🐧 Linux**: Download the \`.AppImage\` (for most distributions) or the \`.deb\` / \`.rpm\` file for your package manager. For Flatpak, see below.
                  - **🍎 macOS**: Download the \`aarch64.dmg\` (Apple Silicon) or \`x64.dmg\` (Intel) file.

                  ### 📦 Flatpak (recommended on rolling distros)
                  Adds Chronicler as a Flatpak remote so future updates flow through \`flatpak update\`:
                  \`\`\`sh
                  flatpak install --user --from ${PAGES_URL}/chronicler.flatpakref
                  \`\`\`
                  Or one-shot install the bundle from this release:
                  \`\`\`sh
                  flatpak install --user Chronicler.flatpak
                  \`\`\`

                  ---

                  ### ⚠️ A Note for Windows Users
                  When you first run the installer, Microsoft Defender may show a "Windows protected your PC" screen. This is expected because Chronicler is a new application from an independent developer and is not yet code-signed.

                  To proceed, simply click **"More info"** and then **"Run anyway"**.

                  ### 🍎 A Note for macOS Users
                  Chronicler for macOS is currently **unsigned**. The first time you open it, you will need to run a command in the Terminal.

                  1.  **Download** the \`.dmg\` file and move the app to your **Applications** folder.
                  2.  **Open the Terminal** app.
                  3.  **Run this command**:
                      \`\`\`sh
                      sudo xattr -rd com.apple.quarantine /Applications/chronicler.app
                      \`\`\`
                  4.  The app will now open correctly.

                  ### 🛡️ Security & Trust
                  While the initial installer is unsigned, all in-app updates are cryptographically signed by me. This is handled by [Tauri's built-in updater](https://tauri.app/plugin/updater), which verifies the update signature before installing it. This ensures that all future updates are authentic and have not been tampered with.
                  EOF
                  gh release edit ${{ github.ref_name }} --notes-file FINAL_RELEASE_NOTES.md

            # Hand the freshly-built .deb off to the `release-flatpak` job.
            # That job runs in a Flathub-maintained container that has
            # flatpak-builder + the GNOME 49 SDK pre-installed, so it can't
            # rebuild the Tauri app itself — it only needs the .deb to repack.
            - name: Upload .deb for Flatpak job
              if: matrix.platform == 'ubuntu-22.04'
              uses: actions/upload-artifact@v4
              with:
                  name: chronicler-deb
                  path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/Chronicler_*_amd64.deb
                  if-no-files-found: error
                  retention-days: 1

    # Flatpak build & publish. Doesn't rebuild from source — repacks the .deb
    # produced above against the GNOME 49 runtime (cures rolling-distro
    # white-screens). The container ships flatpak-builder + the GNOME 49
    # SDK, so we don't need any host-side apt installs or runtime caching.
    release-flatpak:
        needs: release-tauri
        runs-on: ubuntu-22.04
        permissions:
            contents: write
        container:
            image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
            options: --privileged

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download .deb artifact
              uses: actions/download-artifact@v4
              with:
                  name: chronicler-deb
                  path: flatpak/

            # The manifest expects the .deb at flatpak/chronicler.deb regardless
            # of version, so rename whatever versioned file we got.
            - name: Stage .deb at expected name
              run: mv flatpak/Chronicler_*_amd64.deb flatpak/chronicler.deb

            # Pull the existing gh-pages contents into ./site so flatpak-builder
            # writes new OSTree commits *into* the existing repo (preserving
            # static deltas for older versions). On the very first run the
            # branch may not exist yet — that's fine.
            - name: Restore prior gh-pages contents
              run: |
                  mkdir -p site
                  if git ls-remote --exit-code "https://github.com/${{ github.repository }}.git" refs/heads/gh-pages >/dev/null 2>&1; then
                    git clone --depth=1 --branch=gh-pages "https://github.com/${{ github.repository }}.git" tmp-pages
                    cp -a tmp-pages/. site/
                    rm -rf tmp-pages site/.git
                  fi

            # AppStream requires a <releases> element for desktop-application
            # components, but GNOME Software's "what's new" panel is the only
            # consumer that benefits from rich per-version notes -- and our
            # users get those from the in-app updater and the GitHub release
            # page. So we replace the entire <releases> block with a single
            # self-closing <release/> for the current tag and call it done.
            - name: Stamp version into metainfo
              env:
                  VERSION: ${{ github.ref_name }}
              run: |
                  version="${VERSION#v}"
                  date="$(date -u +%Y-%m-%d)"
                  # Use sed -z (GNU) to match the whole <releases> block across
                  # newlines, while requiring the actual self-closing <release/>
                  # shape so the regex doesn't accidentally consume any prose
                  # that mentions <releases> in surrounding comments.
                  sed -i -zE \
                    "s|<releases>[[:space:]]*<release[[:space:]][^/]*/>[[:space:]]*</releases>|<releases>\n    <release version=\"${version}\" date=\"${date}\" />\n  </releases>|" \
                    flatpak/pro.chronicler.Chronicler.metainfo.xml
                  appstreamcli validate \
                    --no-net \
                    flatpak/pro.chronicler.Chronicler.metainfo.xml

            - name: Build Flatpak
              uses: flatpak/flatpak-github-actions/flatpak-builder@v6
              with:
                  bundle: Chronicler.flatpak
                  manifest-path: flatpak/pro.chronicler.Chronicler.yml
                  repo-dir: site/repo
                  branch: stable

            # The action exports to the repo but doesn't generate static deltas,
            # which `flatpak update` uses for incremental downloads.
            #
            # mkdir -p refs/remotes is a workaround for an OSTree repo
            # restored from gh-pages: git doesn't preserve empty directories,
            # so the empty refs/remotes/ that `ostree init` creates gets
            # dropped on the round-trip, and `build-update-repo
            # --generate-static-deltas` then dies enumerating it. Recreating
            # is a no-op on the first run (the dir exists) and a fix on
            # every subsequent run.
            - name: Generate OSTree static deltas
              run: |
                  mkdir -p site/repo/refs/remotes
                  flatpak build-update-repo --generate-static-deltas --prune site/repo

            - name: Render gh-pages templates
              run: |
                  for f in chronicler.flatpakref index.html; do
                    sed "s|\$PAGES_URL|${PAGES_URL}|g" \
                        "flatpak/web/${f}" > "site/${f}"
                  done

            # JS-based action so we don't depend on `gh` being present in the
            # container image. Finds the existing draft release by tag and
            # appends Chronicler.flatpak to its assets.
            - name: Upload Flatpak bundle to release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  files: Chronicler.flatpak

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./site
                  publish_branch: gh-pages
                  user_name: github-actions[bot]
                  user_email: 41898282+github-actions[bot]@users.noreply.github.com
                  commit_message: "chore(flatpak): publish ${{ github.ref_name }}"
